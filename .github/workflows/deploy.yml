name: Deploy do GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Zainstaluj zależności
        run: npm install

      - name: Zbuduj projekt
        run: npm run build

      - name: Prześlij artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Opublikuj na GitHub Pages
        uses: actions/deploy-pages@v4